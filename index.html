<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Estoque Embalagens</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Embalagens">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3350;--accent:#4f8ef7;--danger:#f74f6a;--warn:#f7a84f;--ok:#4fcf8e;--text:#e8eaf6;--muted:#7c82a8;--font:'Segoe UI',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:90px}

  header{background:linear-gradient(135deg,#1a1d27,#222638);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
  .header-row{display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:17px;font-weight:700}
  header p{font-size:11px;color:var(--muted);margin-top:2px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:5px;transition:background .3s}
  .sync-dot.ok{background:var(--ok)}.sync-dot.busy{background:var(--warn);animation:pulse .8s infinite}.sync-dot.err{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .badge-falta{background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:11px 4px;font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .screen{display:none;padding:12px}.screen.active{display:block}

  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
  .sum-card .label{font-size:11px;color:var(--muted);margin-bottom:4px}
  .sum-card .value{font-size:22px;font-weight:800}
  .sum-card.ok .value{color:var(--ok)}.sum-card.warn .value{color:var(--warn)}.sum-card.danger .value{color:var(--danger)}.sum-card.accent .value{color:var(--accent)}

  /* ITEM CARD */
  .item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
  .item-card.alert-baixo{border-left:3px solid var(--warn)}.item-card.alert-falta{border-left:3px solid var(--danger)}
  .item-name{font-size:15px;font-weight:700;margin-bottom:8px;padding-right:64px}
  .item-total{font-size:22px;font-weight:900;color:var(--accent);margin-bottom:8px}
  .item-total.baixo{color:var(--warn)}.item-total.falta{color:var(--danger)}
  .item-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
  .badge-ok{background:rgba(79,207,142,.15);color:var(--ok)}.badge-baixo{background:rgba(247,168,79,.15);color:var(--warn)}.badge-critico{background:rgba(247,79,106,.15);color:var(--danger)}

  /* LOCAIS GRID */
  .locais-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
  .local-cell{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
  .local-cell .lname{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
  .local-cell .lval{font-size:16px;font-weight:800;color:var(--text)}
  .local-cell .lval.zero{color:var(--border)}

  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px;transition:width .4s}
  .fill-ok{background:var(--ok)}.fill-baixo{background:var(--warn)}.fill-critico{background:var(--danger)}
  .card-actions{display:flex;gap:6px;margin-top:10px}
  .card-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer}
  .card-btn.edit{color:var(--accent);border-color:rgba(79,142,247,.3)}.card-btn.del{color:var(--danger);border-color:rgba(247,79,106,.3)}

  /* FALTA */
  .falta-section{background:rgba(247,79,106,.08);border:1px solid rgba(247,79,106,.3);border-radius:10px;padding:14px;margin-bottom:12px}
  .falta-title{font-size:13px;font-weight:700;color:var(--danger);margin-bottom:10px}
  .falta-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(247,79,106,.15);font-size:14px}
  .falta-item:last-child{border-bottom:none}
  .falta-dot{width:8px;height:8px;background:var(--danger);border-radius:50%;flex-shrink:0}

  /* IMPORT */
  .import-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .import-box label{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:10px;resize:vertical;min-height:160px;outline:none}
  textarea:focus{border-color:var(--accent)}

  .btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:10px}
  .btn:active{opacity:.8}.btn-primary{background:var(--accent);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

  .parse-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:13px;display:none}
  .parse-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
  .parse-row:last-child{border-bottom:none}
  .parse-row .pname{color:var(--text);flex:1}.parse-row .punits{color:var(--accent);font-weight:700;white-space:nowrap}.parse-row .ppct{color:var(--muted);font-size:11px;white-space:nowrap}

  .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
  .hist-date{font-size:12px;color:var(--muted);margin-bottom:4px}.hist-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px}.hist-count{font-size:12px;color:var(--muted)}

  .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
  .search-bar{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;padding:11px 14px;outline:none;margin-bottom:12px}
  .search-bar:focus{border-color:var(--accent)}
  .filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,142,247,.4);z-index:200;transition:transform .15s}
  .fab:active{transform:scale(.92)}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:var(--surface2);border:none;color:var(--muted);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer}
  .field-group{margin-bottom:12px}
  .field-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
  .field-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:15px;padding:11px 12px;outline:none}
  .field-input:focus{border-color:var(--accent)}
  .field-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .locais-divider{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 10px;padding-top:10px;border-top:1px solid var(--border)}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;border:1px solid var(--border);z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
  .toast.show{opacity:1}
  .log-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .log-info .log-name{font-size:14px;font-weight:700}
  .log-info .log-time{font-size:11px;color:var(--muted);margin-top:2px}
  .log-info .log-detail{font-size:12px;color:var(--muted);margin-top:3px}
  .log-delta{font-size:18px;font-weight:900;white-space:nowrap}
  .log-delta.pos{color:var(--ok)}.log-delta.neg{color:var(--danger)}.log-delta.neu{color:var(--muted)}
  .snap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .snap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .snap-title{font-size:14px;font-weight:700;color:var(--accent)}
  .snap-date{font-size:11px;color:var(--muted)}
  .snap-delete{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0}
  .snap-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
  .snap-row:last-child{border-bottom:none}
  .snap-row .sname{color:var(--text);flex:1}.snap-row .sval{color:var(--muted);white-space:nowrap}.snap-row .sdiff{font-weight:700;white-space:nowrap;margin-left:8px}
  .sdiff.pos{color:var(--ok)}.sdiff.neg{color:var(--danger)}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>📦 Estoque Embalagens</h1>
      <p><span class="sync-dot" id="syncDot"></span><span id="syncStatus">Conectando...</span></p>
    </div>
    <span class="badge-falta" id="faltaBadge" style="display:none"></span>
  </div>
  <div id="lastModBar" style="display:none;font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
    ✏️ Última alteração: <span id="lastModText" style="color:var(--accent)"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('estoque',this)">Estoque</button>
  <button class="tab" onclick="showTab('falta',this)">Em Falta</button>
  <button class="tab" onclick="showTab('log',this)">Log</button>
  <button class="tab" onclick="showTab('snapshots',this)">Snapshots</button>
</div>

<!-- ESTOQUE -->
<div id="tab-estoque" class="screen active">
  <input class="search-bar" type="text" placeholder="🔍  Buscar embalagem..." id="searchInput">
  <div class="filter-row" id="statusFilterRow">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">OK</button>
    <button class="filter-btn" onclick="setFilter('baixo',this)">Baixo</button>
    <button class="filter-btn" onclick="setFilter('critico',this)">Crítico</button>
  </div>
  <div class="filter-row" id="localFilterRow">
    <button class="filter-btn active" onclick="setLocalFilter('todos',this)">📍 Todos os locais</button>
    <button class="filter-btn" onclick="setLocalFilter('caxias',this)">Caxias</button>
    <button class="filter-btn" onclick="setLocalFilter('sjm',this)">SJM</button>
    <button class="filter-btn" onclick="setLocalFilter('galpao',this)">Galpão</button>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
  <div id="itemList"></div>
</div>

<!-- EM FALTA -->
<div id="tab-falta" class="screen"><div id="faltaContent"></div></div>

<!-- LOG -->
<div id="tab-log" class="screen"><div id="logContent"></div></div>

<!-- SNAPSHOTS -->
<div id="tab-snapshots" class="screen">
  <div class="import-box">
    <label>📸 Tirar snapshot agora</label>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Salva o estado atual com data e hora automáticas. Recomendado na segunda, quarta e sexta.</p>
    <button class="btn btn-primary" onclick="takeSnapshot()">📸 Salvar snapshot agora</button>
  </div>
  <div id="snapshotAnalysis"></div>
</div>

<!-- IMPORTAR (hidden tab, accessible via button) -->
<div id="tab-importar" class="screen" style="display:none">
  <div class="import-box">
    <label>Colar mensagem do WhatsApp</label>
    <textarea id="waText" placeholder="Cole aqui a mensagem do WhatsApp com o inventário..."></textarea>
    <button class="btn btn-secondary" onclick="previewParse()">👁 Pré-visualizar</button>
    <div class="parse-preview" id="parsePreview"></div>
    <div class="field-group" style="margin-top:10px">
      <label>Local de destino</label>
      <select class="field-input" id="importLocal">
        <option value="caxias">Caxias</option>
        <option value="sjm">SJM</option>
        <option value="galpao">Galpão Vermelho</option>
        <option value="total">Total geral (sem local)</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="importData()">✅ Importar inventário</button>
  </div>
  <div class="import-box">
    <label>Danger zone</label>
    <button class="btn btn-danger" onclick="clearAll()">🗑 Apagar todos os dados</button>
  </div>
</div>

<!-- HISTÓRICO (legacy) -->
<div id="tab-historico" class="screen" style="display:none"><div id="histContent"></div></div>

<div class="toast" id="toast"></div>
<button class="fab" id="fabBtn" onclick="openModal()">+</button>

<!-- MODAL ADD/EDIT -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Novo item</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field-group">
      <label>Nome da embalagem</label>
      <input class="field-input" id="fieldName" type="text" placeholder="Ex: Shampoo Karsell 1L">
    </div>
    <div class="locais-divider">Quantidade por local</div>
    <div class="field-row">
      <div class="field-group">
        <label>Caxias</label>
        <input class="field-input" id="fieldCaxias" type="number" inputmode="numeric" placeholder="0" min="0">
      </div>
      <div class="field-group">
        <label>SJM</label>
        <input class="field-input" id="fieldSjm" type="number" inputmode="numeric" placeholder="0" min="0">
      </div>
      <div class="field-group">
        <label>Galpão</label>
        <input class="field-input" id="fieldGalpao" type="number" inputmode="numeric" placeholder="0" min="0">
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Total: <span id="modalTotal" style="color:var(--accent);font-weight:700">0</span> unidades</div>
    <button class="btn btn-primary" onclick="saveItem()">Salvar</button>
    <button class="btn btn-danger" id="deleteBtn" onclick="deleteItem()" style="display:none;margin-top:8px">🗑 Excluir item</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEQ0pAsCBdDbo2RwcQlmD3jx6HteKfNC4",
  authDomain: "folha-de-ponto-xpro.firebaseapp.com",
  databaseURL: "https://folha-de-ponto-xpro-default-rtdb.firebaseio.com",
  projectId: "folha-de-ponto-xpro",
  storageBucket: "folha-de-ponto-xpro.firebasestorage.app",
  messagingSenderId: "988072192165",
  appId: "1:988072192165:web:590e4f9ff775bb18a2454c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'estoqueEmbalagens';
const LOCAIS = ['caxias','sjm','galpao'];
const LOCAIS_LABEL = { caxias:'Caxias', sjm:'SJM', galpao:'Galpão' };

let state = { items:[], falta:[], lastDate:null, lastTime:null, history:[], log:[], snapshots:[], lastModified:null };
let activeFilter = 'todos';
let activeLocalFilter = 'todos';
let editingIndex = null;
let saving = false;

function addLog(action, name, before, after) {
  if (!state.log) state.log=[];
  state.log.unshift({action, name, before, after, unit:'uni', at:new Date().toISOString()});
  if (state.log.length>200) state.log=state.log.slice(0,200);
  state.lastModified = new Date().toISOString();
}

function updateLastModBar() {
  const bar=document.getElementById('lastModBar'), txt=document.getElementById('lastModText');
  if (!bar||!txt) return;
  if (state.lastModified) {
    const dt=new Date(state.lastModified);
    txt.textContent=dt.toLocaleDateString('pt-BR')+' às '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    bar.style.display='block';
  } else bar.style.display='none';
}

// ─── SYNC ────────────────────────────────────────────────
function setSyncStatus(status, msg) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncStatus').textContent = msg;
}

onValue(ref(db, DB_PATH), (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state = {
      items:        Array.isArray(data.items)     ? data.items     : [],
      falta:        Array.isArray(data.falta)     ? data.falta     : [],
      lastDate:     data.lastDate  || null,
      lastTime:     data.lastTime  || null,
      history:      Array.isArray(data.history)   ? data.history   : [],
      log:          Array.isArray(data.log)       ? data.log       : [],
      snapshots:    Array.isArray(data.snapshots) ? data.snapshots : [],
      lastModified: data.lastModified || null
    };
  } else {
    state = { items:[], falta:[], lastDate:null, lastTime:null, history:[], log:[], snapshots:[], lastModified:null };
  }
  renderAll();
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  setSyncStatus('ok', 'Atualizado às ' + now);
}, () => {
  setSyncStatus('err', 'Erro de conexão');
  showToast('⚠️ Sem conexão com o banco');
});

async function save() {
  if (saving) return;
  saving = true;
  setSyncStatus('busy', 'Salvando...');
  try {
    await set(ref(db, DB_PATH), state);
    const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok', 'Salvo às ' + now);
  } catch(e) {
    setSyncStatus('err', 'Erro ao salvar');
    showToast('⚠️ Erro ao salvar');
  }
  saving = false;
}

// ─── TABS ────────────────────────────────────────────────
window.showTab = function(id, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const screen = document.getElementById('tab-'+id);
  if (screen) { screen.style.display=''; screen.classList.add('active'); }
  if (el) el.classList.add('active');
  document.getElementById('fabBtn').style.display = id==='estoque' ? 'flex' : 'none';
  if (id==='falta')     renderFalta();
  if (id==='log')       renderLog();
  if (id==='snapshots') renderSnapshots();
  if (id==='historico') renderHistory();
  if (id==='estoque')   renderEstoque();
};

window.showImportPanel = function() {
  const tab=document.getElementById('tab-importar');
  if(tab) tab.style.display='';
  showTab('importar',null);
};

window.setFilter = function(f, btn) {
  activeFilter = f;
  document.querySelectorAll('#statusFilterRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEstoque();
};

window.setLocalFilter = function(f, btn) {
  activeLocalFilter = f;
  document.querySelectorAll('#localFilterRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEstoque();
};

// ─── PARSE WhatsApp ───────────────────────────────────────
function parseWA(text) {
  const lines = text.split('\n');
  const items = [], falta = [];
  let date = null, time = null, inFalta = false;
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();
    if (!line) continue;
    const dtMatch = line.match(/Data[:\s]*(\d{2}\/\d{2}\/\d{4})/i);
    if (dtMatch) date = dtMatch[1];
    const tmMatch = line.match(/Hora[:\s]*(\d{2}:\d{2})/i);
    if (tmMatch) time = tmMatch[1];
    if (/falta/i.test(line) && /produtos/i.test(line)) { inFalta = true; continue; }
    if (/falta/i.test(line) && line.includes('❌'))    { inFalta = true; continue; }
    const clean = line.replace(/[🅰️❌•*]/g,'').trim();
    if (!clean) continue;
    if (inFalta) { if (clean.length > 2) falta.push(clean.replace(/^[-•·]\s*/,'').trim()); continue; }
    let fullLine = clean;
    if (i+1 < lines.length) {
      const next = lines[i+1].trim();
      if (/^[\d\s.,]+(?:uni(?:dades?)?)?$/.test(next) && next.length > 0) { fullLine = clean+' '+next; i++; }
    }
    const m = fullLine.match(/^(.+?)[-–]\s*(\d+)\s*pct[\s\/]+([.\d\s,]+?)(?:\s*uni(?:dades?)?)?$/i);
    if (m) { const name=m[1].trim(),pct=parseInt(m[2]),units=parseInt(m[3].replace(/[\s.]/g,'').replace(',','')); if(name&&units){items.push({name,pct,units});continue;} }
    const m2 = fullLine.match(/^(.+?)[-–]\s*(\d+)\s*pct[-\s]+([.\d,]+)/i);
    if (m2) { const name=m2[1].trim(),pct=parseInt(m2[2]),units=parseInt(m2[3].replace(/[.]/g,'').replace(',','')); if(name&&units){items.push({name,pct,units});continue;} }
    const m3 = fullLine.match(/^(.+?)[-–]\s*([\d.,]+)\s*uni(?:dades?)?/i);
    if (m3) { const name=m3[1].trim(),units=parseInt(m3[2].replace(/[.]/g,'').replace(',','')); if(name&&units){items.push({name,pct:0,units});continue;} }
  }
  return { items, falta, date, time };
}

window.previewParse = function() {

window.importData = async function() {
  const text = document.getElementById('waText').value;
  if (!text.trim()) { showToast('Cole uma mensagem primeiro'); return; }
  const parsed = parseWA(text);
  if (!parsed.items.length) { showToast('Nenhum item reconhecido'); return; }
  const local = document.getElementById('importLocal').value;

  if (state.items.length) {
    state.history.unshift({ date:state.lastDate||'—', time:state.lastTime||'—', items:JSON.parse(JSON.stringify(state.items)), falta:[...state.falta], importedAt:new Date().toISOString() });
    if (state.history.length > 10) state.history = state.history.slice(0,10);
  }

  // Merge: update existing items or add new ones
  for (const parsed_item of parsed.items) {
    const existing = state.items.find(i => i.name.toLowerCase() === parsed_item.name.toLowerCase());
    if (existing) {
      const before = itemTotal(existing) + (existing._legacyTotal||0);
      if (local === 'total') { existing.caxias=0; existing.sjm=0; existing.galpao=0; existing._legacyTotal=parsed_item.units; }
      else { existing[local] = parsed_item.units; existing._legacyTotal=0; }
      const after = itemTotal(existing) + (existing._legacyTotal||0);
      if (before !== after) addLog('import', existing.name, before, after);
    } else {
      const newItem = { name:parsed_item.name, pct:parsed_item.pct||0, caxias:0, sjm:0, galpao:0, _legacyTotal:0 };
      if (local === 'total') newItem._legacyTotal = parsed_item.units;
      else newItem[local] = parsed_item.units;
      state.items.push(newItem);
      addLog('add', parsed_item.name, 0, parsed_item.units);
    }
  }
  state.falta = parsed.falta;
  state.lastDate = parsed.date;
  state.lastTime = parsed.time;

  await save();
  document.getElementById('waText').value='';
  document.getElementById('parsePreview').style.display='none';
  showToast(`✅ ${parsed.items.length} itens importados`);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.querySelectorAll('.screen').forEach((s,i)=>s.classList.toggle('active',i===0));
  document.getElementById('fabBtn').style.display='flex';
  renderEstoque();
};

window.exportExcel = function() {
  if (!state.items || !state.items.length) { showToast('Nenhum item para exportar'); return; }
  const date = state.lastDate || new Date().toLocaleDateString('pt-BR');
  let csv = 'Nome;Caxias;SJM;Galpão;Total\n';
  for (const item of state.items) {
    const caxias = item.caxias || 0;
    const sjm = item.sjm || 0;
    const galpao = item.galpao || 0;
    const total = caxias + sjm + galpao + (item._legacyTotal || 0);
    csv += `"${item.name}";${caxias};${sjm};${galpao};${total}\n`;
  }
  if (state.falta && state.falta.length) {
    csv += '\nEM FALTA:\n';
    for (const f of state.falta) csv += `"${f}"\n`;
  }
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `EstoqueEmbalagens_${date.replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📊 Excel exportado');
};

function renderAll() { renderHeader(); renderEstoque(); updateLastModBar(); }

function renderHeader() {
  const fb = document.getElementById('faltaBadge');

  else fb.style.display='none';

const THRESHOLDS = { baixo:3000, critico:1000 };
function getStatus(u) { if(u<=0||u<=THRESHOLDS.critico) return 'critico'; if(u<=THRESHOLDS.baixo) return 'baixo'; return 'ok'; }
function statusLabel(s) { return {ok:'OK',baixo:'Baixo',critico:'Crítico'}[s]||s; }
function itemTotal(item) { return (item.caxias||0)+(item.sjm||0)+(item.galpao||0)+(item._legacyTotal||0); }

function renderEstoque() {
  if (!state.items||!state.items.length) {
    document.getElementById('summaryGrid').innerHTML='';
    document.getElementById('itemList').innerHTML='<div class="empty-state">📦 Nenhum inventário carregado.<br>Use o botão + ou vá em Importar.</div>';
    return;
  }
  const search=(document.getElementById('searchInput').value||'').toLowerCase();

  // For local filter, use local qty; otherwise use total
  function displayQty(item) {
    if (activeLocalFilter === 'todos') return itemTotal(item);
    return item[activeLocalFilter] || 0;
  }

  const totals = state.items.map(i=>displayQty(i));
  const ok=totals.filter(u=>getStatus(u)==='ok').length;
  const baixo=totals.filter(u=>getStatus(u)==='baixo').length;
  const critico=totals.filter(u=>getStatus(u)==='critico').length;
  const totalU=totals.reduce((a,b)=>a+b,0);
  const localLabel = activeLocalFilter==='todos' ? 'Total' : LOCAIS_LABEL[activeLocalFilter];
  document.getElementById('summaryGrid').innerHTML=`
    <div class="sum-card ok">   <div class="label">Itens OK</div>       <div class="value">${ok}</div></div>
    <div class="sum-card warn"> <div class="label">Estoque Baixo</div>  <div class="value">${baixo}</div></div>
    <div class="sum-card danger"><div class="label">Crítico</div>        <div class="value">${critico}</div></div>
    <div class="sum-card accent"><div class="label">${localLabel} Unidades</div> <div class="value">${(totalU/1000).toFixed(1)}k</div></div>`;
  const maxU=Math.max(...totals,1);
  let html='';
  for (let idx=0;idx<state.items.length;idx++) {
    const item=state.items[idx];
    const total=itemTotal(item);
    const dispQty=displayQty(item);
    if (search&&!item.name.toLowerCase().includes(search)) continue;
    const st=getStatus(dispQty);
    if (activeFilter!=='todos'&&st!==activeFilter) continue;
    const pctBar=Math.round((dispQty/maxU)*100);
    const fillCls=st==='ok'?'fill-ok':st==='baixo'?'fill-baixo':'fill-critico';
    const cardCls=st==='baixo'?'alert-baixo':st==='critico'?'alert-falta':'';
    const totalCls=st==='ok'?'':st==='baixo'?'baixo':'falta';
    const badgeCls='badge-'+(st==='ok'?'ok':st==='baixo'?'baixo':'critico');

    // locais cells
    const locaisCells = LOCAIS.map(l => {
      const v = item[l]||0;
      return `<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${v===0?' zero':''}">${v.toLocaleString('pt-BR')}</div></div>`;
    }).join('');

    html+=`<div class="item-card ${cardCls}">
      <span class="item-badge ${badgeCls}">${statusLabel(st)}</span>
      <div class="item-name">${item.name}</div>
      <div class="locais-grid">${locaisCells}</div>
      <div class="item-total ${totalCls}">Total: ${total.toLocaleString('pt-BR')}<span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:4px">uni</span></div>
      <div class="progress-bar"><div class="progress-fill ${fillCls}" style="width:${pctBar}%"></div></div>
      <div class="card-actions">
        <button class="card-btn edit" onclick="openModal(${idx})">✏️ Editar</button>
        <button class="card-btn del" onclick="quickDelete(${idx})">🗑 Excluir</button>
      </div>
    </div>`;
  }
  if (!html) html='<div class="empty-state">Nenhum item encontrado.</div>';
  document.getElementById('itemList').innerHTML=html;
}

function renderFalta() {
  let html='';
  if (state.falta&&state.falta.length) {
    html+=`<div class="falta-section"><div class="falta-title">❌ Produtos em falta (${state.falta.length})</div>`;
    for (const f of state.falta) html+=`<div class="falta-item"><div class="falta-dot"></div>${f}</div>`;
    html+='</div>';
  }
  const criticos=(state.items||[]).filter(i=>getStatus(itemTotal(i))==='critico');
  if (criticos.length) {
    html+=`<div class="section-title">⚠️ Estoque Crítico</div>`;
    for (const item of criticos) {
      const locaisCells = LOCAIS.map(l=>`<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${(item[l]||0)===0?' zero':''}">${(item[l]||0).toLocaleString('pt-BR')}</div></div>`).join('');
      html+=`<div class="item-card alert-falta"><span class="item-badge badge-critico">Crítico</span><div class="item-name">${item.name}</div><div class="locais-grid">${locaisCells}</div><div class="item-total falta">Total: ${itemTotal(item).toLocaleString('pt-BR')} uni</div></div>`;
    }
  }
  const baixos=(state.items||[]).filter(i=>getStatus(itemTotal(i))==='baixo');
  if (baixos.length) {
    html+=`<div class="section-title">📉 Estoque Baixo</div>`;
    for (const item of baixos) {
      const locaisCells = LOCAIS.map(l=>`<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${(item[l]||0)===0?' zero':''}">${(item[l]||0).toLocaleString('pt-BR')}</div></div>`).join('');
      html+=`<div class="item-card alert-baixo"><span class="item-badge badge-baixo">Baixo</span><div class="item-name">${item.name}</div><div class="locais-grid">${locaisCells}</div><div class="item-total baixo">Total: ${itemTotal(item).toLocaleString('pt-BR')} uni</div></div>`;
    }
  }
  if (!html) html='<div class="empty-state">✅ Nenhum produto em falta ou crítico.</div>';
  document.getElementById('faltaContent').innerHTML=html;
}

function renderHistory() {
  if (!state.history||!state.history.length) { document.getElementById('histContent').innerHTML='<div class="empty-state">Nenhum histórico ainda.</div>'; return; }
  let html='';
  // Variation report: compare current vs last inventory
  if (state.history.length >= 1 && state.items.length) {
    const prev = state.history[0];
    const gains=[], losses=[];
    for (const cur of state.items) {
      const old = prev.items.find(i=>i.name===cur.name);
      if (!old) continue;
      const diff = itemTotal(cur) - itemTotal(old);
      if (diff > 0) gains.push({name:cur.name, diff});
      if (diff < 0) losses.push({name:cur.name, diff});
    }
    if (gains.length||losses.length) {
      html+=`<div class="section-title">📊 Variação vs inventário anterior</div>`;
      gains.sort((a,b)=>b.diff-a.diff).slice(0,5).forEach(g=>{
        html+=`<div class="hist-item" style="border-left:3px solid var(--ok)"><div class="hist-title" style="color:var(--ok)">+${g.diff.toLocaleString('pt-BR')} uni</div><div class="hist-date">${g.name}</div></div>`;
      });
      losses.sort((a,b)=>a.diff-b.diff).slice(0,5).forEach(l=>{
        html+=`<div class="hist-item" style="border-left:3px solid var(--danger)"><div class="hist-title" style="color:var(--danger)">${l.diff.toLocaleString('pt-BR')} uni</div><div class="hist-date">${l.name}</div></div>`;
      });
    }
  }
  html+=`<div class="section-title">Inventários anteriores</div>`;
  for (const h of state.history) {
    const dt=new Date(h.importedAt);
    const label=dt.toLocaleDateString('pt-BR')+' às '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    html+=`<div class="hist-item"><div class="hist-date">Importado em ${label}</div><div class="hist-title">Inventário de ${h.date}${h.time?' às '+h.time:''}</div><div class="hist-count">${h.items.length} itens · ${h.falta.length} em falta</div></div>`;
  }
  document.getElementById('histContent').innerHTML=html;
}

function updateModalTotal() {

window.openModal = function(idx) {
  editingIndex=(idx!==undefined)?idx:null;
  const isEdit=editingIndex!==null;
  document.getElementById('modalTitle').textContent=isEdit?'Editar item':'Novo item';
  document.getElementById('deleteBtn').style.display=isEdit?'block':'none';
  if (isEdit) {
    const item=state.items[editingIndex];
    document.getElementById('fieldName').value=item.name;
    document.getElementById('fieldCaxias').value=item.caxias||0;
    document.getElementById('fieldSjm').value=item.sjm||0;
    document.getElementById('fieldGalpao').value=item.galpao||0;
    updateModalTotal();
  } else {
    document.getElementById('fieldName').value='';
    document.getElementById('fieldCaxias').value='';
    document.getElementById('fieldSjm').value='';
    document.getElementById('fieldGalpao').value='';
    document.getElementById('modalTotal').textContent='0';
  }
  ['fieldCaxias','fieldSjm','fieldGalpao'].forEach(id=>document.getElementById(id).addEventListener('input',updateModalTotal));
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fieldName').focus(),100);
};

window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); };
window.overlayClick = function(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); };

window.saveItem = async function() {
  const name=document.getElementById('fieldName').value.trim();
  const caxias=parseInt(document.getElementById('fieldCaxias').value)||0;
  const sjm=parseInt(document.getElementById('fieldSjm').value)||0;
  const galpao=parseInt(document.getElementById('fieldGalpao').value)||0;
  if (!name) { showToast('Digite o nome da embalagem'); return; }
  if (editingIndex!==null) {
    const before=itemTotal(state.items[editingIndex]);
    const after=caxias+sjm+galpao;
    state.items[editingIndex]={...state.items[editingIndex], name, caxias, sjm, galpao, _legacyTotal:0};
    if(before!==after) addLog('edit', name, before, after);
    showToast('✅ Item atualizado');
  } else {
    state.items.push({name, caxias, sjm, galpao, pct:0, _legacyTotal:0});
    addLog('add', name, 0, caxias+sjm+galpao);
    showToast('✅ Item adicionado');
  }
  await save(); renderAll(); closeModal();
};

window.deleteItem = async function() {
  if (editingIndex===null) return;
  if (!confirm('Excluir "'+state.items[editingIndex].name+'"?')) return;
  addLog('delete', state.items[editingIndex].name, itemTotal(state.items[editingIndex]), 0);
  state.items.splice(editingIndex,1);
  await save(); renderAll(); closeModal(); showToast('Item excluído');
};

window.quickDelete = async function(idx) {
  if (!confirm('Excluir "'+state.items[idx].name+'"?')) return;
  addLog('delete', state.items[idx].name, itemTotal(state.items[idx]), 0);
  state.items.splice(idx,1);
  await save(); renderAll(); showToast('Item excluído');
};

// ─── LOG ─────────────────────────────────────────────────
function renderLog() {
  const el=document.getElementById('logContent'); if(!el) return;
  if(!state.log||!state.log.length){el.innerHTML='<div class="empty-state">Nenhuma modificação registrada ainda.</div>';return;}
  const actionLabel={edit:'Editado',add:'Adicionado',import:'Importado',delete:'Excluído'};
  let html=`<div class="section-title">${state.log.length} modificações</div>`;
  for(const entry of state.log){
    const dt=new Date(entry.at);
    const time=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const diff=(entry.after||0)-(entry.before||0);
    const cls=diff>0?'pos':diff<0?'neg':'neu';
    const sign=diff>0?'+':'';
    const diffStr=diff!==0?`${sign}${diff.toLocaleString('pt-BR')} uni`:'—';
    html+=`<div class="log-item">
      <div class="log-info">
        <div class="log-name">${entry.name}</div>
        <div class="log-time">${time}</div>
        <div class="log-detail">${actionLabel[entry.action]||entry.action} · ${(entry.before||0).toLocaleString('pt-BR')} → ${(entry.after||0).toLocaleString('pt-BR')} uni</div>
      </div>
      <div class="log-delta ${cls}">${diffStr}</div>
    </div>`;
  }
  el.innerHTML=html;
}

// ─── SNAPSHOTS ───────────────────────────────────────────
window.takeSnapshot = async function() {
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const now=new Date();
  const label=dias[now.getDay()]+' '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(!state.items.length){showToast('Nenhum item para snapshot');return;}
  if(!state.snapshots) state.snapshots=[];
  state.snapshots.unshift({
    label, at:new Date().toISOString(),
    items:state.items.map(i=>({name:i.name,total:itemTotal(i)}))
  });
  if(state.snapshots.length>12) state.snapshots=state.snapshots.slice(0,12);

  await save(); showToast('📸 Snapshot: '+label); renderSnapshots();
};

window.deleteSnapshot = async function(idx) {
  if(!confirm('Excluir snapshot "'+state.snapshots[idx].label+'"?')) return;
  state.snapshots.splice(idx,1);
  await save(); renderSnapshots(); showToast('Snapshot excluído');
};

    html+=`<div class="snap-card">
      <div class="snap-title" style="margin-bottom:10px">🔄 Comparar dois snapshots</div>

          <select class="field-input" id="snapFrom" style="font-size:12px;padding:8px">
            ${state.snapshots.map((s,i)=>`<option value="${i}">${s.label}</option>`).join('')}
          </select></div>
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Para:</div>

            ${state.snapshots.map((s,i)=>`<option value="${i}" ${i===1?'selected':''}>${s.label}</option>`).join('')}
          </select></div>

      <button class="btn btn-secondary" style="margin-top:0;padding:10px" onclick="compareSnapshots()">📊 Comparar</button>
    </div>`;
    html+=`<div id="compareResult"></div>`;
  }
  html+=`<div class="section-title">📸 Snapshots salvos (${state.snapshots.length})</div>`;
  state.snapshots.forEach((snap,idx)=>{

    const time=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    html+=`<div class="snap-card"><div class="snap-header"><div>
      <div class="snap-title">${snap.label}</div>

    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button style="background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;cursor:pointer" onclick="viewSnapshot(${idx})">👁 Ver</button>
      <button class="snap-delete" onclick="deleteSnapshot(${idx})">🗑</button>
    </div></div></div>`;
  });
  el.innerHTML=html;

window.viewSnapshot = function(idx) {
  const snap=state.snapshots[idx];
  const dt=new Date(snap.at);
  const time=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const totalUni=snap.items.reduce((a,b)=>a+b.total,0);
  let html=`<div class="snap-card"><div class="snap-header"><div>
    <div class="snap-title">📸 ${snap.label}</div>
    <div class="snap-date">${time} · ${snap.items.length} itens · ${totalUni.toLocaleString('pt-BR')} uni total</div>
  </div><button class="snap-delete" onclick="renderSnapshots()">✕</button></div>`;
  snap.items.forEach(i=>{html+=`<div class="snap-row"><span class="sname">${i.name}</span><span class="sval" style="color:var(--accent);font-weight:700">${i.total.toLocaleString('pt-BR')} uni</span></div>`;});
  html+='</div>';
  document.getElementById('snapshotAnalysis').innerHTML=html;
};

window.compareSnapshots = function() {
  const fromIdx=parseInt(document.getElementById('snapFrom').value);
  const toIdx=parseInt(document.getElementById('snapTo').value);
  if(fromIdx===toIdx){showToast('Selecione snapshots diferentes');return;}
  const older=state.snapshots[fromIdx];
  const newer=state.snapshots[toIdx];
  const daysDiff=Math.abs(Math.round((new Date(newer.at)-new Date(older.at))/(1000*60*60*24)));
  const changes=[];
  const allNames=new Set([...older.items.map(i=>i.name),...newer.items.map(i=>i.name)]);
  allNames.forEach(name=>{
    const oi=older.items.find(i=>i.name===name);
    const ni=newer.items.find(i=>i.name===name);
    const before=oi?oi.total:0, after=ni?ni.total:0, diff=after-before;
    if(diff!==0) changes.push({name,before,after,diff});
  });
  const consumed=changes.filter(c=>c.diff<0).sort((a,b)=>a.diff-b.diff);
  const replenished=changes.filter(c=>c.diff>0).sort((a,b)=>b.diff-a.diff);
  let html=`<div class="snap-card">
    <div class="snap-title">📊 ${older.label} → ${newer.label}</div>
    <div class="snap-date" style="margin-bottom:10px">${daysDiff} dia${daysDiff!==1?'s':''} · ${changes.length} itens com variação</div>`;
  if(consumed.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📉 Consumido (${consumed.length})</div>`;
    consumed.forEach(c=>{html+=`<div class="snap-row"><span class="sname">${c.name}</span><span class="sval">${c.before.toLocaleString('pt-BR')}→${c.after.toLocaleString('pt-BR')}</span><span class="sdiff neg">${c.diff.toLocaleString('pt-BR')}</span></div>`;});
  }
  if(replenished.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">📈 Reposto (${replenished.length})</div>`;
    replenished.forEach(c=>{html+=`<div class="snap-row"><span class="sname">${c.name}</span><span class="sval">${c.before.toLocaleString('pt-BR')}→${c.after.toLocaleString('pt-BR')}</span><span class="sdiff pos">+${c.diff.toLocaleString('pt-BR')}</span></div>`;});
  }
  if(!changes.length) html+=`<div style="color:var(--muted);font-size:13px;padding:10px 0">Nenhuma variação encontrada.</div>`;
  html+='</div>';
  document.getElementById('compareResult').innerHTML=html;
};

window.showToast = function(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Fix search for ES module scope
document.getElementById('searchInput').addEventListener('input', () => renderEstoque());
</script>
